<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SUEDS Hotels | TV Vendas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="tv.css">
  </head>
  <body>
    <main class="dashboard-shell tv-shell">
      <header class="topbar">
        <div class="tv-title-block">
          <p class="eyebrow">Central de Vendas</p>
          <h1>Meta da Equipe</h1>
        </div>
        <div class="tv-online-group">
          <strong>Clientes<br>online:</strong>
          <section id="analyticsStrip" class="analytics-strip" aria-label="Google Analytics em tempo real"></section>
        </div>
        <div class="tv-header-controls">
          <label class="month-control" for="monthSelect">
            <span>Mês</span>
            <select id="monthSelect"></select>
          </label>
          <div class="status-strip">
            <span class="live-dot"></span>
            <span id="lastUpdate">Atualizando...</span>
          </div>
        </div>
      </header>

      <section id="sellerGrid" class="seller-grid" aria-label="Cumprimento de metas por vendedor"></section>

      <footer class="tv-legend" aria-label="Legenda dos indicadores">
        <span><strong>ICM:</strong> indice de cumprimento de meta</span>
      </footer>
    </main>

    <script src="tv.js"></script>
  </body>
</html>
